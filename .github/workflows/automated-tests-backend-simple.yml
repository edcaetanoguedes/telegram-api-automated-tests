name: Testes Cypress manuais

on:
  workflow_dispatch:  # permite execução manual

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório de testes
        uses: actions/checkout@v4

      - name: Clonar repositório da aplicação (ex: backend)
        run: |
          git clone https://github.com/edcaetanoguedes/telegram-api-backend.git app

      - name: Instalar dependências da aplicação
        working-directory: app
        run: npm ci

      - name: Iniciar aplicação em background
        working-directory: app
        run: |
          npm start &  # ou `npm run dev &` se for estável
          sleep 5

      - name: Verificar se a aplicação está no ar
        run: npx wait-on http://localhost:4000

      - name: Instalar dependências de testes
        run: npm ci

      - name: Rodar testes Cypress
        run: npm run test:cy
