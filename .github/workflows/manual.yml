name: Testes Cypress manuais

on:
  workflow_dispatch:

jobs:
  backend-e2e-tests-automated:
    name: Testes Automatizados E2E (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar backend com git clone
        run: |
          git clone https://x-access-token:${{ secrets.GH_TELEGRAM_API_TESTS_TOKEN }}@github.com/edcaetanoguedes/telegram-api-backend.git telegram-api-backend


      - name: Instalar dependências da aplicação (backend)
        working-directory: telegram-api-backend
        run: npm ci

      - name: Iniciar aplicação em background
        working-directory: telegram-api-backend
        run: |
          npm start &

      - name: Esperar aplicação subir
        run: npx wait-on http://localhost:4000

      - name: Clonar repositório de testes (atual)
        uses: actions/checkout@v4

      - name: Instalar dependências de testes (Cypress)
        run: npm ci

      - name: Rodar testes Cypress
        run: npm run test:cy:all
